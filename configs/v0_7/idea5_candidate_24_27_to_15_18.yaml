experiment:
  name: gemma2_v0_7_idea5_candidate_24_27_to_15_18
  output_root: outputs

model:
  family: gemma2
  large_model_name: google/gemma-2-9b
  small_model_name: google/gemma-2-2b
  tokenizer_name: google/gemma-2-2b
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  torch_dtype: bfloat16
  freeze_backbones: true
  gradient_checkpointing: false
  trust_remote_code: false
  allow_qwen_fallback: false
  debug_random_init: false

split:
  large_prefix_end: 23
  large_removed_start: 24
  large_removed_end: 27
  large_suffix_start: 28
  small_entry_target_layer: 14
  small_delegate_start: 15
  small_delegate_end: 18

adapters:
  entry_projector: affine
  return_adapter_rank: 64
  bridge_rank: 64
  gate_init: 0.01
  use_rmsnorm_after_entry: true
  rms_norm_eps: 1.0e-6

training:
  seed: 42
  seq_len: 256
  micro_batch_size: 1
  grad_accum_steps: 8
  num_workers: 0
  learning_rate: 3.0e-4
  weight_decay: 0.0
  max_grad_norm: 1.0
  log_every: 10
  stage_a:
    max_steps: 100
    save_every: 100
  stage_b:
    max_steps: 100
    save_every: 100
    kl_weight: 5.0
    ce_weight: 1.0
    delta_reg_weight: 1.0e-4
    train_entry_projector: false
  stage_c:
    max_steps: 100
    save_every: 50
    kl_weight: 1.0
    ce_weight: 1.0
    delta_reg_weight: 1.0e-4

data:
  use_synthetic_data: false
  cache_dir: outputs/cache
  train_wikitext_examples: 128
  train_gsm8k_examples: 64
  val_wikitext_examples: 32
  gsm8k_eval_examples: 200
  strategyqa_eval_examples: 200
  synthetic_text_repeats: 32

eval:
  max_new_tokens: 64
  gsm8k_examples: 200
  strategyqa_examples: 200
  speed_prompt_tokens: 128
  speed_decode_tokens: 32

window_search:
  pilot_seeds: [42]
  confirm_seeds: [42]
  large_window_lengths: [4]
  small_window_lengths: [4]
  large_start_offsets: [0]
  small_start_offsets: [0]
  shortlist_size: 1
  stage_a_steps: 100
  stage_b_steps: 100
  top_k: 5
  max_validation_batches: 8

